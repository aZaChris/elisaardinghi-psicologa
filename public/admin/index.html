<!DOCTYPE html>
<!-- Pagina di ingresso per l'interfaccia di amministrazione (CMS) -->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestione Contenuti | Elisa Ardinghi</title>
    
    <!-- Script per l'autenticazione tramite Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <!-- Libreria principale di Decap CMS (l'interfaccia vera e propria) -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      // Il sito pubblico è su Vercel, ma Netlify Identity gira su un progetto
      // Netlify separato creato solo per questo (vedi docs/cms-identity-setup.md).
      // Senza APIUrl il widget cercherebbe Identity sullo stesso dominio del
      // sito, dove non esiste: va puntato esplicitamente al progetto Netlify.
      if (window.netlifyIdentity) {
        window.netlifyIdentity.init({
          APIUrl: "https://phenomenal-selkie-2fe138.netlify.app/.netlify/identity"
        });

        // Semplice script per gestire il re-indirizzamento dopo il login con Netlify Identity
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            // Se l'utente non è loggato, monitora l'evento di login per ricaricare la pagina admin
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
