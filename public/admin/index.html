<!DOCTYPE html>
<!-- Pagina di ingresso per l'interfaccia di amministrazione (CMS) -->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Gestione Contenuti | Elisa Ardinghi</title>

    <!-- Senza slash finale (es. /admin invece di /admin/), Vercel serve questa
         pagina senza redirect e i percorsi relativi (come config.yml) si
         risolverebbero dalla radice del sito, dando 404. Questo tag fissa
         la base indipendentemente da come l'URL è stato digitato. -->
    <base href="/admin/" />
  </head>
  <body>
    <!-- Niente widget Netlify Identity qui: quando window.netlifyIdentity non
         esiste, Decap CMS costruisce da solo il client di autenticazione
         usando identity_url/gateway_url già definiti in config.yml (che
         puntano al progetto Netlify dedicato). Il widget standalone
         ignorava il nostro APIUrl personalizzato e chiamava sempre il
         dominio del sito (Vercel), dove /.netlify/identity non esiste. -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  </body>
</html>
