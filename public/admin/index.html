<!DOCTYPE html>
<!-- Pagina di ingresso per l'interfaccia di amministrazione (CMS) -->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Gestione Contenuti | Elisa Ardinghi</title>

    <!-- Base robusta indipendentemente da eventuali richieste dirette senza
         slash finale (es. /admin invece di /admin/). -->
    <base href="/admin/" />
  </head>
  <body>
    <!-- Gli script vanno DENTRO body (non in head): Decap CMS si aggancia a
         document.body appena parte, e in head il body non esiste ancora. -->

    <!-- Questa pagina va raggiunta tramite il dominio Netlify dedicato
         (vedi vercel.json: /admin/* reindirizza lì), quindi Identity e
         Git Gateway sono sullo stesso dominio: nessun APIUrl custom serve. -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
      // Gestisce il re-indirizzamento dopo il login/accettazione invito
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

    <!-- Libreria principale di Decap CMS (l'interfaccia vera e propria) -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  </body>
</html>
