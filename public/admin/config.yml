backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"
logo_url: "/favicon.svg"

collections:
  - name: "blog"
    label: "Articoli"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Estratto", name: "excerpt", widget: "text", hint: "Max 200 caratteri" }
      - { label: "Immagine copertina", name: "coverImage", widget: "image", required: false }
      - { label: "Tag", name: "tags", widget: "list", default: [] }
      - { label: "Pubblicato (Visibile sul sito)", name: "published", widget: "boolean", default: true }
      - { label: "Contenuto", name: "body", widget: "markdown" }
